version: '2'

services:
  web:
    build:
      context: .
      args:
        REQFILE: requirements-dev.txt
    container_name: insitu.app
    environment:
      - POSTGRES_HOST=db
      - DJANGO_MIGRATE=yes
      - DJANGO_COLLECT_STATIC=yes
      - DJANGO_INDEX_CONTENT=no
      - ELASTICSEARCH_REQUEST_TIMEOUT=60
      - ALLOWED_HOSTS=0.0.0.0
      - UWSGI_PORT=8000
      - TIMEOUT=60
    depends_on:
      - db
    volumes:
      - static:/var/local/static
      - logging:/var/local/copernicus/logging

  db:
    image: postgres:17-alpine
    container_name: insitu.db
    env_file:
      - docker/db.env
    volumes:
      - data:/var/lib/postgresql/data

  elasticsearch_test:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.3.1
    container_name: insitu.elasticsearch_test
    volumes:
      - esdata_test:/usr/share/elasticsearch/data
    ports:
      - 9201:9201

volumes:
  static:
    driver: local
  data:
    driver: local
  esdata_test:
    driver: local
  logging:
    driver: local
